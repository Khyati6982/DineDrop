<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Menu List</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    
    <div class="list-container">
        <h2>All Menu Items</h2>

        <a th:href="@{/admin/restaurants}" class="back-link">← Back to Restaurants</a> 
        <br><br>

        <a th:href="@{/admin/menu/add}" class="add-button">+ Add New Item</a> 

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Price (₹)</th>
                        <th>Restaurant</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${menuItems}">
                        <td th:text="${item.name}">Name</td>
                        <td th:text="${item.description}">Description</td>
                        <td th:text="${item.price}">Price</td>
                        <td th:text="${item.restaurant.name}">Restaurant</td>
                        <td th:text="${item.inStock ? 'In Stock' : 'Out of Stock'}">Stock</td>
                        <td>
                            <div class="menu-actions">
                                <a th:href="@{'/admin/menu/edit/' + ${item.id}}" class="edit-button">Edit</a>
                                <a th:href="@{'/admin/menu/delete/' + ${item.id}}" 
                                   class="delete-button"
                                   onclick="return confirm('Are you sure you want to delete this dish?');">Delete</a>
                                <form th:action="@{'/admin/menu/' + ${item.id} + '/toggle-stock'}" method="post">
                                    <button type="submit" class="toggle-button">Toggle Stock</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
