<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Cancelled - DineDrop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/checkout-flow.css}">
</head>
<body>
   <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="cancel-container">
        <h2>❌ Payment Cancelled</h2>
        <p>Your payment was cancelled. Don’t worry, no order was placed.</p>
        <p>You can browse restaurants and try again anytime.</p>

        <div class="cancel-links">
            <a th:href="@{/restaurants}">🍽️ Browse Restaurants</a>
            <a th:href="@{/cart}">← Back to Cart</a>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
