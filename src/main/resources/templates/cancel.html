<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Cancelled - DineDrop</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/checkout-flow.css">
</head>
<body>
    <div class="container">
        <h2>❌ Payment Cancelled</h2>
        <p>Looks like you cancelled the payment. Don’t worry, your cart is still saved.</p>

        <nav>
            <a th:href="@{/checkout}">🛍️ Try Again</a> |
            <a th:href="@{/cart}">← Back to Cart</a>
        </nav>
    </div>
</body>
</html>
