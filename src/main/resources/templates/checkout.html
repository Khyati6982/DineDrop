<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout - DineDrop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/checkout-flow.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="checkout-container">
        <h1>🛍️ Checkout</h1>
        <p class="tagline">Review your order and proceed to payment.</p>

        <!-- Cart Summary -->
        <div class="card">
            <h2>🧾 Your Cart</h2>
            <table>
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td th:text="${item.menuItem.name}">Item Name</td>
                        <td th:text="${item.quantity}">1</td>
                        <td>₹<span th:text="${item.menuItem.price}">0.00</span></td>
                    </tr>
                </tbody>
            </table>
            <p><strong>Total:</strong> ₹<span th:text="${totalAmount}">0.00</span></p>
        </div>

        <!-- Delivery Address Form -->
        <div class="card">
            <h3>🚚 Delivery Details</h3>
            <form th:action="@{/checkout/place}" method="post">
                <label for="deliveryAddress">Delivery Address:</label><br>
                <textarea name="deliveryAddress" rows="3" cols="40" required></textarea><br><br>

                <!-- Hidden inputs for cart items -->
                <div th:each="item : ${cartItems}">
                    <input type="hidden" name="menuItemIds" th:value="${item.menuItem.id}" />
                    <input type="hidden" name="quantities" th:value="${item.quantity}" />
                </div>

                <button type="submit" class="payment-btn">💳 Proceed to Payment</button>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
