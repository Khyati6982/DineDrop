<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Cart - DineDrop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}" />
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="cart-container">
        <h2>Your Cart 🛒</h2>

        <!-- Add More Items  -->
        <p style="margin-top: 10px;">
            <a th:href="@{/restaurants}" class="add-more-btn">+ Add More Items</a>
        </p>

        <!-- If cart has items -->
        <div th:if="${#lists.size(cartItems) > 0}">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td th:text="${item.menuItem.name}">Item Name</td>
                            <td>₹<span th:text="${item.menuItem.price}">0.00</span></td>
                            <td>
                                <form th:action="@{'/cart/update/' + ${item.menuItem.id}}" method="post">
                                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" required />
                                    <button type="submit" class="update-btn">Update</button>
                                </form>
                            </td>
                            <td>₹<span th:text="${item.totalPrice}">0.00</span></td>
                            <td>
                                <form th:action="@{'/cart/remove/' + ${item.menuItem.id}}" method="post">
                                    <button type="submit" class="remove-btn">Remove</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Total Price -->
            <p><strong>Total:</strong> ₹<span th:text="${totalPrice}">0.00</span></p>

            <!-- Checkout & Clear Cart -->
            <div class="cart-actions">
                <form th:action="@{/cart/clear}" method="post">
                    <button type="submit" class="clear-btn">Clear Cart</button>
                </form>
                <form th:action="@{/checkout}" method="get">
                    <button type="submit" class="checkout-btn">Proceed to Checkout</button>
                </form>
            </div>
        </div>

        <!-- If cart is empty -->
        <div th:unless="${#lists.size(cartItems) > 0}" class="empty-cart">
            <h3>😕 Oops, your cart is empty!</h3>
            <p>Browse for your favorite dish and add it to your cart.</p>
            <a th:href="@{/restaurants}" class="browse-btn">🍽️ Browse More Items</a>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
