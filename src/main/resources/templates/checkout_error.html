<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout Error - DineDrop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/checkout-flow.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div class="error-container">
        <h2>⚠️ Order Error</h2>
        <p th:text="${errorMessage}">Something went wrong with your order.</p>

        <div class="error-links">
            <a th:href="@{/cart}">← Back to Cart</a>
            <a th:href="@{/restaurants}">🍽️ Browse Restaurants</a>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
