<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders - DineDrop</title>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/orders.css}">
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>
    
    <div class="container">
        <h2>📦 My Orders</h2>

        <!-- If orders exist -->
        <div th:if="${#lists.size(orders) > 0}">
            <table class="table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Restaurant</th>
                        <th>Items</th>
                        <th>Total Amount</th>
                        <th>Status</th>
                        <th>Placed On</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${order.id}"></td>
                        <td th:text="${order.restaurant.name}"></td>
                        <td>
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>Dish</th>
                                        <th>Quantity</th>
                                        <th>Price</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${order.items}">
                                        <td th:text="${item.menuItem.name}"></td> 
                                        <td th:text="${item.quantity}"></td> 
                                        <td th:text="${item.price}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>
                        <td th:text="${order.totalAmount}"></td>
                        
                        <!-- Status -->
                        <td>
                            <span th:class="'status-badge status-' + ${order.paymentStatus != null  ? order.paymentStatus.toLowerCase() : 'unknown'}"
                                  th:text="${order.paymentStatus}"></span>
                        </td>
                        
                        <td th:text="${#temporals.format(order.orderTime, 'dd-MMM-yyyy HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>

            <!-- Centered Browse More -->
            <div class="orders-links" style="text-align: center; margin-top: 20px;"> 
                <a th:href="@{/restaurants}" class="btn btn-primary">🍽️ Browse More</a> 
            </div>
        </div>

        <!-- If no orders -->
        <div th:unless="${#lists.size(orders) > 0}" class="empty-orders" style="text-align: center; margin-top: 40px;">
            <h3>😕 You haven’t placed any orders yet!</h3>
            <p>Browse restaurants and order your favorite dishes.</p>
            <a th:href="@{/restaurants}" class="btn btn-warning">🍽️ Browse Restaurants</a>
        </div>
    </div>
    
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
