<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - DineDrop</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">="UTF-8">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>
    <div class="register-container">
        <h2>Create Your DineDrop Account</h2>
        <form th:action="@{/register}" method="post" th:object="${user}">
            <label>Username:</label>
            <input type="text" th:field="*{username}" required />

            <label>Email:</label>
            <input type="email" th:field="*{email}" 
                   required 
                   pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" 
                   title="Please enter a valid email address" />

            <label>Password:</label>
            <input type="password" th:field="*{password}" required />

            <label>Phone:</label>
            <input type="tel" th:field="*{phone}" 
                   pattern="[0-9]{10}" 
                   title="Phone number must be 10 digits" 
                   maxlength="10" />

            <label>Address:</label>
            <input type="text" th:field="*{address}" />

            <button type="submit" class="btn btn-primary">Register</button>
        </form>

        <p class="error-message" th:if="${error}" th:text="${error}"></p>
        <p class="success-message" th:if="${message}" th:text="${message}"></p>

        <p class="login-link">
            Already have an account?
            <a th:href="@{/login}">Login here</a>
        </p>
    </div>
</body>
</html>
